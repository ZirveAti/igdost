
<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bizim Ekip</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: black;
    color: white;
    text-align: center;
    overflow-x: hidden;
}

/* YILDIZ ARKA PLAN */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
}

/* BAŞLIK */
h1 {
    margin-top: 50px;
    font-size: 35px;
}

/* YAZI ANİMASYONU */
.typing {
    color: #aaa;
    margin-bottom: 30px;
    border-right: 2px solid white;
    display: inline-block;
    white-space: nowrap;
    overflow: hidden;
    animation: typing 4s steps(40), blink .7s infinite;
}

@keyframes typing {
    from { width: 0 }
    to { width: 260px }
}

@keyframes blink {
    50% { border-color: transparent }
}

/* GRID */
.kapsayici {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
    padding: 20px;
}

/* KART */
.kart {
    padding: 25px 40px;
    border-radius: 15px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    transition: 0.3s;
    position: relative;
}

/* BORDER */
.kart::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 15px;
    padding: 2px;
    background: linear-gradient(45deg, #00f0ff, #ff00c8);
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
            mask-composite: exclude;
}

.kart:hover {
    transform: scale(1.08);
    box-shadow: 0 0 25px rgba(0,255,255,0.4);
}

/* İSİM */
.kart h3 {
    margin: 0;
    text-transform: lowercase; /* BÜYÜK HARF SORUNU ÇÖZÜLDÜ */
}

/* LINK */
.kart a {
    text-decoration: none;
    color: white;
}

/* ADMIN */
.admin::before {
    background: linear-gradient(45deg, gold, orange);
}

.admin h3 {
    color: gold;
}

/* HAKKIMIZDA */
.hakkinda {
    margin-top: 50px;
    padding: 20px;
    color: #bbb;
}

/* FOOTER */
.footer {
    margin-top: 40px;
    padding: 20px;
    color: #666;
    font-size: 14px;
}
</style>

</head>
<body>

<canvas id="stars"></canvas>

<h1>🚀 bizim ekip 🚀</h1>
<p class="typing">takılmalık ekip | instagram linkleri ↓</p>

<div class="kapsayici">

    <div class="kart admin">
        <a href="https://instagram.com/quitat1" target="_blank">
            <h3>quitat1 👑</h3>
        </a>
    </div>

    <div class="kart">
        <a href="https://www.instagram.com/jokeraslindahakliydi/" target="_blank">
            <h3>jokeraslindahakliydi</h3>
        </a>
    </div>

    <div class="kart">
        <a href="https://www.instagram.com/mehmt_0d/" target="_blank">
            <h3>mehmt_0d</h3>
        </a>
    </div>

    <div class="kart">
        <a href="https://www.instagram.com/levent_ydpnr" target="_blank">
            <h3>levent_ydpnr</h3>
        </a>
    </div>

    <div class="kart">
        <a href="https://www.instagram.com/muhyettinsry/" target="_blank">
            <h3>muhyettinsry</h3>
        </a>
    </div>

</div>

<div class="hakkinda">
    <p>biz sadece takılan bir ekip değiliz 😎</p>
    <p>bu site tamamen eğlence amaçlı yapılmıştır</p>
</div>

<div class="footer">
    © 2026 quitat1
</div>

<!-- YILDIZ SCRIPT -->
<script>
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

for (let i = 0; i < 100; i++) {
    stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 2
    });
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "white";

    stars.forEach(star => {
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
        ctx.fill();

        star.y += 0.3;
        if (star.y > canvas.height) star.y = 0;
    });

    requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
